[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 1000000

remappings = [
    "forge-std/=lib/forge-std/src/",
    "UniswapX/=lib/UniswapX/",
    "solmate/=lib/solmate/",
    "permit2/=lib/UniswapX/lib/permit2/",
]

[rpc_endpoints]
arbitrum = "${ARB_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
